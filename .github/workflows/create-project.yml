name: Create Flutter Project

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create Project
        run: flutter create app_project

      - name: Move Project Files
        run: |
          mv app_project/* .
          mv app_project/.* . || true
          rm -rf app_project

      - name: Commit Project
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Full Flutter project generated"
          git push
